---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: randofin-os
# description will be included in the image's metadata
description: This is my personal spin based on the latest bluefin image.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/bluefin-dx
image-version: latest # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: files
    files:
      - source: system
        destination: /
    snippets:
      - 'cd $CONFIG_DIRECTORY/scripts && for script in *.sh; do [ -f "$script" ] && bash "$script"; done'

  - type: dnf
    install:
      packages:
        - gnome-shell-extension-dash-to-panel
        - gnome-shell-extension-just-perfection
        - gnome-shell-extension-user-theme
        - qt5ct
        - qt5-qtstyleplugins
        - syncthing
        - waydroid
        # Blue95 inspired
        - wine-ms-sans-serif-fonts
        - wine-tahoma-fonts
        - https://github.com/felixrieseberg/clippy/releases/download/v0.4.3/Clippy-0.4.3-1.x86_64.rpm
        - https://github.com/1j01/jspaint/releases/download/v1.0.0-beta.1/jspaint-1.0.0-Linux-x64.rpm
    remove:
      packages:
        - android-tools
        - cockpit-bridge
        - cockpit-machines
        - cockpit-networkmanager
        - cockpit-ostree
        - cockpit-podman
        - cockpit-selinux
        - cockpit-storaged
        - cockpit-system
        - code
        - docker-ce
        - docker-ce-cli
        - docker-ce-rootless-extras
        - docker-compose-plugin
        - docker-model-plugin
        - containerd
        - moby-engine

  - type: default-flatpaks
    configurations:
      - notify: true # Send notification after install/uninstall is finished (true/false)
        scope: system
        # If no repo information is specified, Flathub will be used by default
        install: # system flatpaks we want all users to have and not remove
          - net.waterfox.waterfox
          - com.vscodium.codium
          - org.telegram.desktop
          # Blue95
          - org.gtk.Gtk3theme.Chicago95
        remove: # replace default Firefox with Waterfox
          - org.mozilla.firefox
      - scope: user # Also add Flathub user repo, but no user packages

  - type: signing # this sets up the proper policy & signing files for signed images to work fully
